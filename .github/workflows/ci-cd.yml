name: build-test-push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (no push yet)
        uses: docker/build-push-action@v5
        with:
          push: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:${{ github.sha }}

      - name: Smoke test
        run: |
          docker run -d -p 5000:5000 --name quiz-ai ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:latest
          sleep 5
          curl /api/health || exit 1
          docker stop quiz-ai

      - name: Push to Docker Hub
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:${{ github.sha }}

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_URL }}
